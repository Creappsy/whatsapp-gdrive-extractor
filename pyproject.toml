[tool.briefcase]
project_name = "WhatsApp Extractor"
bundle = "com.daferferso"
version = "1.0.0"
url = "https://github.com/daferferso/whatsapp-gdrive-extractor"
author = "daferferso"
author_email = "your-email@example.com"

[tool.briefcase.app.whatsapp_extractor]
formal_name = "WhatsApp Extractor"
description = "Extractor de copias de seguridad de WhatsApp desde Google Drive"
license = "MIT"
sources = ["src/whatsapp_extractor"]
requires = [
    "Flask>=3.0.0",
    "gpsoauth==2.0.0",
    "pycryptodomex>=3.0",
    "requests>=2.0.0",
]

[tool.briefcase.app.whatsapp_extractor.macOS]
requires = [
    "toga-cocoa>=0.4.0",
    "adbutils>=2.0.0",
]

[tool.briefcase.app.whatsapp_extractor.windows]
requires = [
    "toga-winforms>=0.4.0",
    "adbutils>=2.0.0",
]

[tool.briefcase.app.whatsapp_extractor.linux]
requires = [
    "toga-gtk>=0.4.0",
    "adbutils>=2.0.0",
]

[tool.briefcase.app.whatsapp_extractor.android]
requires = [
    "toga-android>=0.4.0",
]
build_gradle_dependencies = [
    "androidx.appcompat:appcompat:1.0.2",
    "androidx.constraintlayout:constraintlayout:1.1.3",
    "androidx.swiperefreshlayout:swiperefreshlayout:1.1.0",
]
